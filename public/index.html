<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
      color: #2d3748;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 64px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 2.5rem; margin: 0 0 12px; }
    p  { color: #718096; margin: 0 0 24px; }
    button {
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3182ce; }
    #response { margin-top: 16px; font-size: 0.9rem; color: #4a5568; min-height: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World! 👋</h1>
    <p>Deployed automatically to AWS via GitHub Actions</p>
    <button onclick="ping()">Ping the API</button>
    <div id="response"></div>
  </div>
  <script>
    async function ping() {
      const el = document.getElementById('response');
      el.textContent = 'Loading…';
      try {
        const res = await fetch('/api/hello');
        const data = await res.json();
        el.textContent = `✅ ${data.message} — ${data.timestamp}`;
      } catch (e) {
        el.textContent = '❌ Could not reach API';
      }
    }
  </script>
</body>
</html>
